[project]
name = "ko-tools"
version = "0.1.0"
description = "Ko's personal opinionated CLI — thin wrappers around SDKs I use often, built so both I and AI agents can lean on it."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
authors = [{ name = "Ko" }]
dependencies = [
    "arxiv>=3.0.0",
    "arxiv2markdown>=0.1.0",
    "exa-py>=2.12.0",
    "google-api-python-client>=2.194.0",
    "google-auth>=2.49.2",
    "google-auth-oauthlib>=1.3.1",
    "liteparse>=2.0.7",
    "mcp[cli]>=1.27.0",
    "pydantic-ai>=1.87.0",
    "typer>=0.24.1",
]

[project.scripts]
ko = "ko.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ko"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.11",
]
